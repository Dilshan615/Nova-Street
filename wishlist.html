<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist | Nova Street Fashion</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .wishlist-page-card {
            background: #fff;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            transition: var(--transition);
            border: none;
        }

        .wishlist-page-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        .wishlist-img-box {
            height: 300px;
            position: relative;
        }

        .wishlist-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .remove-wish-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff4757;
            transition: var(--transition);
        }

        .remove-wish-btn:hover {
            background: #ff4757;
            color: #fff;
        }
    </style>
</head>

<body>

    <!-- Header / Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top scrolled" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="index.html">Nova Street.</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="categories.html">Categories</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">All Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                </ul>
            </div>
            <div class="nav-icons d-flex align-items-center">
                <a href="wishlist.html" class="btn position-relative me-2">
                    <i class="bi bi-heart-fill text-dark"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-dark"
                        style="font-size: 0.6rem;">0</span>
                </a>
                <a href="cart.html" class="btn position-relative me-2">
                    <i class="bi bi-bag"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                        style="font-size: 0.6rem;">0</span>
                </a>
                <a href="login.html" class="btn d-none d-md-inline-block p-0 ms-2"><i class="bi bi-person fs-4"></i></a>
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <section class="py-5 mt-5">
        <div class="container py-5">
            <div class="text-center mb-5">
                <h1 class="display-3 fw-bold">My Wishlist</h1>
                <p class="lead text-muted">All your favorite items in one place.</p>
            </div>

            <div id="wishlistPageGrid" class="row g-4">
                <!-- Wishlist items will be injected by script.js -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container text-center">
            <p class="text-muted small">&copy; 2026 Nova Street Fashion Global. All rights reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/script.js"></script>
</body>

</html>
